{% extends 'base.html' %}
{% load static %}

{% block title %}
  BlogSpot - Create Blog
{% endblock %}

{% block content %}
  <link rel="stylesheet" href="{% static 'css/create_blog.css' %}">
  
  <div class="form-container">
    <h2 class="form-heading">Create a New Blog Post</h2>
    <form method="POST" action="{% url 'blogapp:create_blog' %}">
      {% csrf_token %}
      <div class="form-group">
        <label for="title">Blog Title</label>
        <input type="text" class="form-control" id="title" name="title" required>
      </div>
      <div class="form-group">
        <label for="content">Content</label>
        <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
      </div>
      <div class="form-group">
        <label for="author">Select Author</label>
        <select class="form-control" id="author" name="author" required>
          <option value="">Select an author</option>
          {% for author in authors %}
            <option value="{{ author.id }}">{{ author.username }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit" class="submit-btn">Create Blog</button>
    </form>
  </div>
{% endblock %}
