{% extends 'base.html' %}
{% load static %}

{% block title %}
  BlogSpot - Register Profile
{% endblock %}

{% block content %}
  <link rel="stylesheet" href="{% static 'css/register.css' %}">

  <div class="register-container">
    <h2>Register</h2>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Register</button>
    </form>
  </div>
{% endblock %}
