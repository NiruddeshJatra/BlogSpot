{% extends 'base.html' %}
{% load static %}

{% block title %}
  BlogSpot - Login
{% endblock %}

{% block content %}
  <link rel="stylesheet" href="{% static 'css/login_logout.css' %}">

  <div class="login-container">
    <h2>Login</h2>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
  </div>
{% endblock %}
