{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>
      {% block title %}
        
      {% endblock %}
    </title>
    <meta name="description" content="BlogSpot - a web application where you can post and read blogs.">
    <meta name="author" content="niruddesh jatra">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
  </head>
  <body>

    <!-- Navigation Bar -->
    <nav>
      <div class="navbar-left">
        <a href="{% url 'blogapp:home' %}">Home</a>
        <a href="{% url 'blogapp:authors' %}">Authors</a>
        <a href="{% url 'blogapp:create_blog' %}">Create Blog</a>
      </div>
      <h2>BlogSpot</h2>
      <div class="navbar-right">
        <a href="{% url 'blogapp:register' %}">Register</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="content">
      {% block content %}
        
      {% endblock %}
    </div>

    <!-- Footer -->
    <footer>
      <div class="footer-content">
        <p class="footer-title">BlogSpot - Sharing Ideas Worldwide</p>
        <div class="footer-logo">
          <img src="" alt="Logo" width="50">
        </div>
        <div class="contact-info">
          <h3>Contact</h3>
          <p><b>Email:</b><a href="mailto:nasifulalam1212@gmail.com" target="_blank">&nbsp;nasifulalam1212@gmail.com</a></p>
          <p><b>Phone:</b><a href="tel:+801626181662" target="_blank">&nbsp;+801626181662</a></p>
        </div>
      </div>
    </footer>

    <script src="" async defer></script>
  </body>
</html>
